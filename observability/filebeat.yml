filebeat.inputs:
- type: container
  enabled: true
  paths:
    - '/var/lib/docker/containers/*/*.log'
  fields:
    service: legalassist
    environment: production
  processors:
    - add_kubernetes_metadata:
        host: ${HOSTNAME}
    - add_docker_metadata: ~

processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~
  - add_fields:
      target: ''
      fields:
        service: legalassist
        environment: production

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "legalassist-%{+yyyy.MM.dd}"
  pipeline: "legalassist-ingest-pipeline"

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
