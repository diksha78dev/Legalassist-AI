# Default values for legalassist-ai Helm chart

replicaCount: 3

image:
  repository: legalassist-ai
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 8501
  annotations: {}

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: legalassist.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: legalassist-tls
      hosts:
        - legalassist.example.com

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /api/v1/health/live
    port: http
    scheme: HTTP
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/health/ready
    port: http
    scheme: HTTP
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# PostgreSQL Configuration
postgresql:
  enabled: true
  auth:
    username: legal_user
    password: changeme  # Change in production!
    database: legalassist_db
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi

# Redis Configuration
redis:
  enabled: true
  auth:
    enabled: true
    password: changeme  # Change in production!
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

# Prometheus Configuration
prometheus:
  enabled: true
  retention: 30d
  storageSize: 50Gi

# Grafana Configuration
grafana:
  enabled: true
  adminPassword: changeme  # Change in production!
  persistence:
    enabled: true
    size: 5Gi

# Jaeger Tracing Configuration
jaeger:
  enabled: true
  collector:
    port: 14268
  agent:
    port: 6831

# Environment Variables
env:
  - name: ENVIRONMENT
    value: production
  - name: LOG_LEVEL
    value: INFO
  - name: JAEGER_AGENT_HOST
    value: jaeger
  - name: JAEGER_AGENT_PORT
    value: "6831"

# Secrets (reference external secret management)
secrets:
  externalSecrets:
    enabled: false
    backendType: aws-secrets-manager  # or vault, etc.

# Network Policies
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress

# Pod Disruption Budget (for high availability)
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Monitoring & Alerts
monitoring:
  alerts:
    enabled: true
  dashboards:
    enabled: true

# Blue-Green Deployment
deployment:
  strategy: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
