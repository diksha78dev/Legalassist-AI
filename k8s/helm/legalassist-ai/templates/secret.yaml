apiVersion: v1
kind: Secret
metadata:
  name: {{ include "legalassist-ai.fullname" . }}-secrets
  labels:
    {{- include "legalassist-ai.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.create }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | default "" | b64enc | quote }}
  twilio-account-sid: {{ .Values.secrets.twilioAccountSid | default "" | b64enc | quote }}
  twilio-auth-token: {{ .Values.secrets.twilioAuthToken | default "" | b64enc | quote }}
  sendgrid-api-key: {{ .Values.secrets.sendgridApiKey | default "" | b64enc | quote }}
  {{- end }}
