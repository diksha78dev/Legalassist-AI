apiVersion: v1
kind: Secret
metadata:
  name: {{ include "legalassist-ai.fullname" . }}-secrets
  labels:
    {{- include "legalassist-ai.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 encoded secrets - replace with actual values or use external secret management
  openai-api-key: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  twilio-account-sid: {{ .Values.secrets.twilioAccountSid | b64enc | quote }}
  twilio-auth-token: {{ .Values.secrets.twilioAuthToken | b64enc | quote }}
  sendgrid-api-key: {{ .Values.secrets.sendgridApiKey | b64enc | quote }}
