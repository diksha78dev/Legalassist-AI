apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "legalassist-ai.fullname" . }}-network-policy
  labels:
    {{- include "legalassist-ai.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "legalassist-ai.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from nginx ingress controller
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-nginx
      ports:
      - protocol: TCP
        port: 8501
    # Allow traffic from prometheus
    - from:
      - namespaceSelector:
          matchLabels:
            name: monitoring
      ports:
      - protocol: TCP
        port: 9090
    # Allow traffic from same namespace
    - from:
      - podSelector: {}
      ports:
      - protocol: TCP
        port: 8501
      - protocol: TCP
        port: 9090
  egress:
    # Allow DNS
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: UDP
        port: 53
    # Allow to PostgreSQL
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: postgresql
      ports:
      - protocol: TCP
        port: 5432
    # Allow to Redis
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: redis
      ports:
      - protocol: TCP
        port: 6379
    # Allow to Jaeger
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: jaeger
      ports:
      - protocol: UDP
        port: 6831
      - protocol: TCP
        port: 14268
    # Allow external HTTPS for API calls
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: TCP
        port: 443
