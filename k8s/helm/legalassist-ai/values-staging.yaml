# Staging Environment Values
replicaCount: 2

image:
  repository: ghcr.io/AseemPrasad/legalassist-ai
  tag: staging
  pullPolicy: Always

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  hosts:
    - host: REPLACE_ME_WITH_YOUR_STAGING_DOMAIN
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: staging-tls
      hosts:
        - REPLACE_ME_WITH_YOUR_STAGING_DOMAIN

postgresql:
  auth:
    password: staging_password
  primary:
    persistence:
      size: 10Gi

redis:
  auth:
    password: staging_redis_password

env:
  - name: ENVIRONMENT
    value: staging
  - name: LOG_LEVEL
    value: DEBUG
  - name: ENABLE_PROFILING
    value: "true"
